<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for matte dark backing -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141a24" />
      <stop offset="100%" stop-color="#090c10" />
    </radialGradient>

    <!-- Glowing Linear Gradient for Front Lines -->
    <linearGradient id="frontLineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Translucent Gradient for Back Lines -> depth effect -->
    <linearGradient id="backLineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.25" />
    </linearGradient>

    <!-- Glow Filter for the Nodes and Lines -->
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- High-end sleek rounded dark canvas representing an app icon / smart control hub -->
  <rect x="2" y="2" width="96" height="96" rx="24" fill="url(#bgGrad)" stroke="#111827" stroke-width="1.5" />

  <!-- Grid subtle accents to feel like a blueprints network -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#1f2937" stroke-width="0.75" stroke-dasharray="2 4" opacity="0.3" />

  <!-- ================= BACKGROUND / HIDDEN 3D WIREFRAME LINES ================= -->
  <g stroke="url(#backLineGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Back Pillar -->
    <line x1="50" y1="59" x2="50" y2="34" />
    <!-- Back Base -->
    <line x1="50" y1="59" x2="20" y2="76" />
    <line x1="50" y1="59" x2="80" y2="76" />
    <!-- Back Middle Ring -->
    <line x1="50" y1="34" x2="20" y2="51" />
    <line x1="50" y1="34" x2="80" y2="51" />
    <!-- Back Roof Slopes -->
    <line x1="50" y1="9" x2="20" y2="51" />
    <line x1="50" y1="9" x2="80" y2="51" />
  </g>

  <!-- ================= FOREGROUND VIBRANT 3D WIREFRAME LINES ================= -->
  <g stroke="url(#frontLineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowFilter)">
    <!-- Vertical Front Pillars -->
    <line x1="50" y1="93" x2="50" y2="68" />
    <line x1="20" y1="76" x2="20" y2="51" />
    <line x1="80" y1="76" x2="80" y2="51" />
    <!-- Front Base -->
    <line x1="50" y1="93" x2="20" y2="76" />
    <line x1="50" y1="93" x2="80" y2="76" />
    <!-- Front Middle Ring -->
    <line x1="50" y1="68" x2="20" y2="51" />
    <line x1="50" y1="68" x2="80" y2="51" />
    <!-- Front Roof Slopes -->
    <line x1="50" y1="43" x2="20" y2="51" />
    <line x1="50" y1="43" x2="80" y2="51" />
    <!-- Roof Ridge Line -->
    <line x1="50" y1="43" x2="50" y2="9" />
  </g>

  <!-- ================= INTERSECTION GLOWING NODES ================= -->
  <g filter="url(#glowFilter)">
    <!-- Cyan glow points for major front intersections -->
    <circle cx="50" cy="93" r="6" fill="#10b981" opacity="0.4" />
    <circle cx="50" cy="93" r="2.5" fill="#ffffff" />

    <circle cx="20" cy="76" r="6" fill="#10b981" opacity="0.4" />
    <circle cx="20" cy="76" r="2.5" fill="#ffffff" />

    <circle cx="80" cy="76" r="6" fill="#10b981" opacity="0.4" />
    <circle cx="80" cy="76" r="2.5" fill="#ffffff" />

    <circle cx="50" cy="68" r="7" fill="#00f0ff" opacity="0.5" />
    <circle cx="50" cy="68" r="3" fill="#ffffff" />

    <circle cx="20" cy="51" r="7" fill="#00f0ff" opacity="0.5" />
    <circle cx="20" cy="51" r="3" fill="#ffffff" />

    <circle cx="80" cy="51" r="7" fill="#00f0ff" opacity="0.5" />
    <circle cx="80" cy="51" r="3" fill="#ffffff" />

    <circle cx="50" cy="43" r="8" fill="#10b981" opacity="0.5" />
    <circle cx="50" cy="43" r="3.5" fill="#ffffff" />

    <circle cx="50" cy="9" r="8" fill="#00f0ff" opacity="0.6" />
    <circle cx="50" cy="9" r="3.5" fill="#ffffff" />

    <!-- Dimmer nodes for back hidden structures for absolute 3D realism -->
    <circle cx="50" cy="59" r="4.5" fill="#0ea5e9" opacity="0.3" />
    <circle cx="50" cy="59" r="1.5" fill="#e0f2fe" />

    <circle cx="50" cy="34" r="4.5" fill="#0ea5e9" opacity="0.3" />
    <circle cx="50" cy="34" r="1.5" fill="#e0f2fe" />
  </g>
</svg>
