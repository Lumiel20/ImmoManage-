<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Glow and Neon Indigo/Violet Gradient -->
    <linearGradient id="modernPrimary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Neon Cyan to Royal Blue for Tech contrast -->
    <linearGradient id="modernSecondary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <!-- Drop Shadow for sophisticated layer separation -->
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.5" flood-color="#4f46e5" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Transparent background container -->
  <g filter="url(#logoShadow)">
    <!-- First Layer: High-end Minimalist Roof/Crown Peak (Indicates Protection and Real Estate) -->
    <path d="M 20,40 L 50,18 L 80,40" stroke="url(#modernPrimary)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Second Layer: Inner Interleaving Geometric Pillars forming the 'M' of Manage & Growth Chart -->
    <!-- Left Column (Vibrant Cyan representing Digital Integrity) -->
    <path d="M 32,46 L 32,77" stroke="url(#modernSecondary)" stroke-width="8" stroke-linecap="round" fill="none" />
    
    <!-- Right Ascending Pillar (Representing Real Estate Value & Revenue growth) -->
    <path d="M 50,56 L 50,77" stroke="url(#modernPrimary)" stroke-width="8" stroke-linecap="round" fill="none" />
    
    <!-- Extended Accent Right Column -->
    <path d="M 68,38 L 68,77" stroke="url(#modernPrimary)" stroke-width="8" stroke-linecap="round" fill="none" />
  </g>
</svg>
