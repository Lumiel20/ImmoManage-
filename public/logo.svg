<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#3730a3" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Isometric Building 1 (Left Tower) -->
  <path d="M 25,45 L 50,30 L 50,75 L 25,90 Z" fill="url(#primaryGrad)" />
  <path d="M 50,30 L 75,45 L 75,90 L 50,75 Z" fill="url(#secondaryGrad)" />
  <!-- Roof Top of Left Tower -->
  <path d="M 25,45 L 50,30 L 75,45 L 50,60 Z" fill="url(#lightGrad)" opacity="0.85" />

  <!-- Overlapping Glass Office/Right Accent -->
  <path d="M 52,48 L 72,38 L 72,68 L 52,78 Z" fill="#4f46e5" opacity="0.35" />
  
  <!-- Windows / Tech Dots -->
  <circle cx="37" cy="55" r="2.5" fill="#ffffff" opacity="0.9" />
  <circle cx="37" cy="65" r="2.5" fill="#ffffff" opacity="0.9" />
  <circle cx="37" cy="75" r="2.5" fill="#ffffff" opacity="0.9" />
  
  <circle cx="63" cy="55" r="2.5" fill="#ffffff" opacity="0.5" />
  <circle cx="63" cy="65" r="2.5" fill="#ffffff" opacity="0.5" />
  <circle cx="63" cy="75" r="2.5" fill="#ffffff" opacity="0.5" />

  <!-- Floating Digital Leaf/Roof Point (represents automated management) -->
  <polygon points="50,12 58,22 50,32 42,22" fill="#a5b4fc" />
</svg>
